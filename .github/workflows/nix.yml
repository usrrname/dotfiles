name: Nix CI

on:
  push:
    branches: [main, nix-migration]
  pull_request:
    branches: [main]

jobs:
  flake-check:
    name: Flake Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: Check Flake
        run: nix flake check

  home-manager:
    name: Home Manager (${{ matrix.system }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: linux
            attr: .#linux
          - system: pi
            attr: .#pi
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: Build Home Manager (${{ matrix.system }})
        run: home-manager build ${{ matrix.attr }} --show-trace

  nixos:
    name: NixOS Config Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: Evaluate NixOS Config
        run: nix eval .#nixosConfigurations.nixos.pkgs.system
